<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Campus Leaderboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .gold { background-color: #ffd700 !important; font-weight: bold; }
        .silver { background-color: #c0c0c0 !important; }
        .bronze { background-color: #cd7f32 !important; color: white; }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-center">🏆 Campus Impact Leaderboard</h2>
    <table class="table table-hover shadow mt-4">
        <thead class="table-dark">
        <tr><th>Rank</th><th>Student</th><th>Points</th></tr>
        </thead>
        <tbody>
        <tr th:each="user, iterStat : ${users}"
            th:classappend="${iterStat.count == 1 ? 'gold' : (iterStat.count == 2 ? 'silver' : (iterStat.count == 3 ? 'bronze' : ''))}">
            <td th:text="${iterStat.count}">1</td>
            <td th:text="${user.username}">Student</td>
            <td th:text="${user.impactScore}">0</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
